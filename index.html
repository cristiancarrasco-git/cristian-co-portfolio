
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <script>
        (function () {
          var host = location.hostname;
          if (
            location.protocol === "http:" &&
            (host === "cristian-co.com" || host === "www.cristian-co.com")
          ) {
            location.replace(
              "https://" + host + location.pathname + location.search + location.hash
            );
          }
        })();
      </script>
      <link rel="canonical" href="https://cristian-co.com/" />
      <meta property="og:url" content="https://cristian-co.com/" />
      <title>Portfolio Website Prototype</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
